<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SSS Core Math Utilities Tests</title>
  <style>
    body { font-family: monospace; padding: 1em; background: #111; color: #ccc; }
    h1 { color: #fff; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .section { margin-top: 1em; font-weight: bold; color: #aaa; }
    #summary { margin-top: 1.5em; font-size: 1.2em; border-top: 1px solid #444; padding-top: 0.5em; }
  </style>
</head>
<body>
  <h1>SSS Core Math Utilities Tests</h1>
  <div id="output"></div>
  <div id="summary"></div>

  <script src="../js/sss.js"></script>
  <script>
    (function () {
      var passed = 0;
      var failed = 0;
      var output = document.getElementById('output');

      function log(message, cls) {
        var el = document.createElement('div');
        el.textContent = message;
        if (cls) el.className = cls;
        output.appendChild(el);
      }

      function section(name) {
        var el = document.createElement('div');
        el.textContent = name;
        el.className = 'section';
        output.appendChild(el);
      }

      function assert(condition, message) {
        if (condition) {
          passed++;
          log('  PASS: ' + message, 'pass');
        } else {
          failed++;
          log('  FAIL: ' + message, 'fail');
        }
      }

      function assertEqual(actual, expected, message) {
        var ok = actual === expected;
        if (ok) {
          passed++;
          log('  PASS: ' + message, 'pass');
        } else {
          failed++;
          log('  FAIL: ' + message + ' — expected ' + String(expected) + ', got ' + String(actual), 'fail');
        }
      }

      function summary() {
        var el = document.getElementById('summary');
        var total = passed + failed;
        var text = 'Results: ' + passed + ' passed, ' + failed + ' failed out of ' + total + ' tests';
        el.textContent = text;
        el.className = failed === 0 ? 'pass' : 'fail';
      }

      // -----------------------------------------------------------------------
      // toBase64 / fromBase64 round-trip
      // -----------------------------------------------------------------------
      section('toBase64 / fromBase64');

      var PRIME = SSS._prime;
      var b64Cases = [0n, 1n, 255n, 2n ** 128n, PRIME - 1n];

      b64Cases.forEach(function (v) {
        var encoded = SSS.toBase64(v);
        assertEqual(encoded.length, 44, 'toBase64(' + v + ') length is 44');
        var decoded = SSS.fromBase64(encoded);
        assertEqual(decoded, v, 'fromBase64(toBase64(' + v + ')) round-trips');
      });

      // -----------------------------------------------------------------------
      // splitInts / mergeInts round-trip
      // -----------------------------------------------------------------------
      section('splitInts / mergeInts');

      var siCases = ['hello', 'a', 'x'.repeat(64)];

      siCases.forEach(function (s) {
        var chunks = SSS.splitInts(s);
        assert(chunks.length > 0, 'splitInts("' + s.slice(0, 8) + (s.length > 8 ? '…' : '') + '") produces chunks > 0');
        var merged = SSS.mergeInts(chunks);
        assertEqual(merged, s, 'mergeInts(splitInts("' + s.slice(0, 8) + (s.length > 8 ? '…' : '') + '")) round-trips');
      });

      // -----------------------------------------------------------------------
      // evaluatePolynomial
      // -----------------------------------------------------------------------
      section('evaluatePolynomial');

      // f(x) = 3 + 2x + x^2  =>  coefficients = [3, 2, 1]  =>  f(2) = 3+4+4 = 11
      var polyResult = SSS.evaluatePolynomial([3n, 2n, 1n], 2n);
      assertEqual(polyResult, 11n, 'f(x)=3+2x+x² at x=2 equals 11');

      // -----------------------------------------------------------------------
      // modInverse
      // -----------------------------------------------------------------------
      section('modInverse');

      var miCases = [1n, 2n, 12345n, PRIME - 1n];

      miCases.forEach(function (v) {
        var inv = SSS.modInverse(v);
        var product = (v * inv) % PRIME;
        assertEqual(product, 1n, 'v=' + v + ': (v * modInverse(v)) % prime === 1n');
      });

      // -----------------------------------------------------------------------
      // random
      // -----------------------------------------------------------------------
      section('random');

      var r1 = SSS.random();
      var r2 = SSS.random();
      assert(r1 >= 0n && r1 < PRIME, 'random() result r1 is in [0, prime)');
      assert(r2 >= 0n && r2 < PRIME, 'random() result r2 is in [0, prime)');
      assert(r1 !== r2, 'two calls to random() produce different values');

      // -----------------------------------------------------------------------
      summary();
    })();
  </script>
</body>
</html>
